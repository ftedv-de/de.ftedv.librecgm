<form class="homey-form" id="login-form">
  <div class="homey-form-group">
    <label class="homey-form-label" for="email">LibreLinkUp E-Mail</label>
    <input class="homey-form-input" id="email" type="email" required />
  </div>

  <div class="homey-form-group">
    <label class="homey-form-label" for="password">Passwort</label>
    <input class="homey-form-input" id="password" type="password" required />
  </div>

  <div class="homey-form-group">
    <label class="homey-form-label" for="region">Region</label>
    <select class="homey-form-select" id="region">
      <option value="de">Germany</option>
      <option value="eu">Europe</option>
      <option value="us">United States</option>
      <option value="global">Global</option>
    </select>
  </div>

  <button class="homey-button-primary-full" type="submit">
    Login
  </button>
</form>

<script>
  const form = document.getElementById('login-form');

  form.addEventListener('submit', async event => {
    event.preventDefault();

    const credentials = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      region: document.getElementById('region').value
    };

    try {
      await Homey.emit('login', credentials);
      Homey.nextView();
    } catch (err) {
      Homey.alert(err.message || String(err));
    }
  });
</script>
